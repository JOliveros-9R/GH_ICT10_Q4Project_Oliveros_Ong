<body>
    <h1 class="mb-4">Attendance Tracker</h1>
        <form>
            <label for="AttendanceDropdown">Select Month</label>
            <select class="form-select" id="AttendanceDropdown">
                <option value="" selected disabled>Select the month...</option>
                <option value="0">Jan</option>
                <option value="1">Feb</option>
                <option value="2">Mar</option>
                <option value="3">Apr</option>
                <option value="4">May</option>
                <option value="5">Aug</option>
                <option value="6">Sep</option>
                <option value="7">Oct</option>
                <option value="8">Nov</option>
                <option value="9">Dec</option>
            </select><br>

            <label for="input2">Absences</label>
            <input type="number" class="form-control" id="input2" placeholder="Enter the number of absences..."><br>

            <input type="button" py-click="attendance_graph" value="Submit">
        </form>

                <div id="output"></div>

 <py-script type="py" src="atc.py"></py-script>
